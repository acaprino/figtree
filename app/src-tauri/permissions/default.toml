"$schema" = "schemas/desktop-schema.json"

[[permission]]
identifier = "allow-spawn-tool"
description = "Allows spawning a CLI tool session"
commands.allow = ["spawn_tool"]

[[permission]]
identifier = "allow-write-pty"
description = "Allows writing to a PTY session"
commands.allow = ["write_pty"]

[[permission]]
identifier = "allow-resize-pty"
description = "Allows resizing a PTY session"
commands.allow = ["resize_pty"]

[[permission]]
identifier = "allow-kill-session"
description = "Allows killing a PTY session"
commands.allow = ["kill_session"]

[[permission]]
identifier = "allow-heartbeat"
description = "Allows sending heartbeat to a session"
commands.allow = ["heartbeat"]

[[permission]]
identifier = "allow-active-session-count"
description = "Allows querying active session count"
commands.allow = ["active_session_count"]

[[permission]]
identifier = "allow-scan-projects"
description = "Allows scanning project directories"
commands.allow = ["scan_projects"]

[[permission]]
identifier = "allow-load-settings"
description = "Allows loading settings"
commands.allow = ["load_settings"]

[[permission]]
identifier = "allow-save-settings"
description = "Allows saving settings"
commands.allow = ["save_settings"]

[[permission]]
identifier = "allow-load-usage"
description = "Allows loading usage data"
commands.allow = ["load_usage"]

[[permission]]
identifier = "allow-record-usage"
description = "Allows recording usage data"
commands.allow = ["record_usage"]

[[permission]]
identifier = "allow-create-project"
description = "Allows creating a new project directory"
commands.allow = ["create_project"]

[[permission]]
identifier = "allow-save-session"
description = "Allows saving session state"
commands.allow = ["save_session"]

[[permission]]
identifier = "allow-load-session"
description = "Allows loading session state"
commands.allow = ["load_session"]

[[permission]]
identifier = "allow-save-clipboard-image"
description = "Allows saving clipboard image as temp PNG"
commands.allow = ["save_clipboard_image"]

[[permission]]
identifier = "allow-get-token-usage"
description = "Allows getting token usage statistics"
commands.allow = ["get_token_usage"]

[[permission]]
identifier = "allow-list-directory"
description = "Allows listing directory contents for folder tree browser"
commands.allow = ["list_directory"]

[[permission]]
identifier = "allow-load-themes"
description = "Allows loading theme definitions from filesystem"
commands.allow = ["load_themes"]

[[permission]]
identifier = "allow-load-builtin-prompts"
description = "Allows loading builtin system prompts"
commands.allow = ["load_builtin_prompts"]

[[permission]]
identifier = "allow-save-prompt"
description = "Allows saving a system prompt to file"
commands.allow = ["save_prompt"]

[[permission]]
identifier = "allow-update-prompt"
description = "Allows updating an existing system prompt file"
commands.allow = ["update_prompt"]

[[permission]]
identifier = "allow-delete-prompt"
description = "Allows deleting a system prompt file"
commands.allow = ["delete_prompt"]

[[permission]]
identifier = "allow-set-window-corner-preference"
description = "Allows setting window corner rounding preference"
commands.allow = ["set_window_corner_preference"]

[[permission]]
identifier = "allow-sidecar-available"
description = "Allows checking sidecar availability status"
commands.allow = ["sidecar_available"]

[[permission]]
identifier = "allow-spawn-agent"
description = "Allows spawning an agent SDK session"
commands.allow = ["spawn_agent"]

[[permission]]
identifier = "allow-agent-send"
description = "Allows sending a message to an agent session"
commands.allow = ["agent_send"]

[[permission]]
identifier = "allow-agent-resume"
description = "Allows resuming a past agent session"
commands.allow = ["agent_resume"]

[[permission]]
identifier = "allow-agent-fork"
description = "Allows forking an agent session"
commands.allow = ["agent_fork"]

[[permission]]
identifier = "allow-agent-interrupt"
description = "Allows soft-interrupting an agent session (abort + resume)"
commands.allow = ["agent_interrupt"]

[[permission]]
identifier = "allow-agent-kill"
description = "Allows killing an agent session"
commands.allow = ["agent_kill"]

[[permission]]
identifier = "allow-agent-permission"
description = "Allows responding to an agent permission prompt"
commands.allow = ["agent_permission"]

[[permission]]
identifier = "allow-agent-ask-response"
description = "Allows responding to an agent ask-type prompt"
commands.allow = ["agent_ask_response"]

[[permission]]
identifier = "allow-agent-set-model"
description = "Allows changing the model of an agent session"
commands.allow = ["agent_set_model"]

[[permission]]
identifier = "allow-agent-set-perm-mode"
description = "Allows changing the permission mode of an agent session"
commands.allow = ["agent_set_perm_mode"]

[[permission]]
identifier = "allow-list-agent-sessions"
description = "Allows listing past agent sessions"
commands.allow = ["list_agent_sessions"]

[[permission]]
identifier = "allow-get-agent-messages"
description = "Allows retrieving messages from a past agent session"
commands.allow = ["get_agent_messages"]

[[permission]]
identifier = "allow-agent-autocomplete"
description = "Allows requesting autocomplete from an agent session"
commands.allow = ["agent_autocomplete"]

[[permission]]
identifier = "allow-refresh-commands"
description = "Allows refreshing available slash commands from an agent session"
commands.allow = ["refresh_commands"]

[[permission]]
identifier = "allow-autocomplete-files"
description = "Allows file path autocomplete"
commands.allow = ["autocomplete_files"]

[[permission]]
identifier = "allow-read-external-file"
description = "Allows reading file content for attachment inlining"
commands.allow = ["read_external_file"]

[[permission]]
identifier = "allow-run-claude-command"
description = "Allows running whitelisted Claude CLI subcommands (login, logout, status, doctor)"
commands.allow = ["run_claude_command"]

[[permission]]
identifier = "allow-get-marketplace-plugins"
description = "Allows getting bundled marketplace plugin paths"
commands.allow = ["get_marketplace_plugins"]

[[permission]]
identifier = "allow-set-marketplace-global"
description = "Allows enabling/disabling marketplace plugins globally"
commands.allow = ["set_marketplace_global"]
